# ─── General ────────────────────────────────────────────
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

add_newline = true

# ─── Character ──────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# ─── Directory ──────────────────────────────────────────
[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold cyan"

# ─── Git Branch ─────────────────────────────────────────
[git_branch]
format = " on [$symbol$branch]($style) "
symbol = " "
style = "bold purple"

# ─── Git Status ─────────────────────────────────────────
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# ─── Command Duration ──────────────────────────────────
[cmd_duration]
min_time = 2_000          # 2秒以上かかったら表示
format = " took [$duration]($style)"
style = "bold yellow"

# ─── Languages ──────────────────────────────────────────
[python]
format = ' via [${symbol}${version}]($style)'
symbol = " "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile"]

[nodejs]
format = ' via [${symbol}${version}]($style)'
symbol = " "
style = "bold green"

[rust]
format = ' via [${symbol}${version}]($style)'
symbol = " "
style = "bold red"

[golang]
format = ' via [${symbol}${version}]($style)'
symbol = " "
style = "bold cyan"

[docker_context]
format = ' via [${symbol}${context}]($style)'
symbol = " "
style = "bold blue"
